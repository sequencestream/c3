# CI — mandatory gates for every pull request.
#
# A single job runs all gates sequentially: lint / i18n / typecheck / build.
# One checkout, one install, one runner.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: i18n check
        run: pnpm i18n:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
