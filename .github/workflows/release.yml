# Release workflow (release 6/7) — GH Actions native matrix for the c3 release pipeline.
#
# Why a separate workflow: bytecodes + macOS ad-hoc codesign only pay off when each target
# is built on its NATIVE OS runner. Cross-compile + bytecode segfaults (oven-sh/bun#18416);
# macOS ad-hoc needs a darwin host.
#
# Self-contained per-target jobs (no actions/upload-artifact): because cross-compile is
# banned, every target must build on its own native OS runner. Rather than shuttle the
# per-target outputs through GitHub's artifact store and re-gather them, each target runs
# the WHOLE tail in ONE job — build → smoke → sign → verify(postgate) → upload to the
# self-hosted store. The `needs:` chain enforces the gate order: a red pregate skips every
# target; within a target a failed build/smoke/sign/verify aborts that target's upload.
#
# Consequences of the self-contained design (intentional):
#   - The minisign secret is needed on all four OS runners (signing happens per target),
#     not just one publish runner.
#   - There is no cross-target unified manifest.json / SHA256SUMS: each target carries its
#     OWN single-target sidecars. Consumers verify a download with its own .minisig.
#
# Distribution: the signed artifacts are pushed to a self-hosted store via
# `scripts/publish/upload-to-server.mjs` (POST /v1/artifact/upload on the license-server),
# laid out as <version>/<batch>/<filename>. `batch` is resolved ONCE in `setup` so all
# targets of one release land in the same time subdirectory. The push is gated on the
# C3_ARTIFACT_SERVER_URL / C3_ARTIFACT_UPLOAD_TOKEN secrets being present.
#
# Target subset + version: a `setup` job resolves the `targets` input (default: all four),
# the `version` input (optional, e.g. v0.1.0 → C3_RELEASE_VERSION), a shared `batch`, and a
# `publish` flag (false when workflow_dispatch sets skip_publish). Each job is gated on
# `contains(targets, '<target>')`; a DESELECTED target is SKIPPED (not red).
#
# Trigger: workflow_dispatch (manual release entry; runs the full chain).
#          push tags: v* (re-build + re-sign + re-upload for the pushed tag).
#
# Local `pnpm release` still works — this workflow calls the same node scripts
# (release:build, release:smoke, sign, postgate) so local and CI share one source of truth.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.1.0 (overrides git-describe). Empty = derive from the git tag.'
        required: false
        default: ''
        type: string
      targets:
        description: 'Comma-separated targets to build (default: all = linux-x64,macos-arm64,macos-x64,windows-x64). Deselecting a P0 target (e.g. drop macos-x64 when Intel runners are starved) narrows the publish gate to the selected set.'
        required: false
        default: ''
        type: string
      skip_publish:
        description: 'Skip publishing (build + smoke + sign + verify only; no upload).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    tags: ['v*']

permissions:
  contents: read # checkout only — no git tag / gh release in this workflow

jobs:
  # ────────────────────────────────────────────────────────────────────
  # -1. setup — resolve the target subset + version + batch + publish flag ONCE so
  #     every per-target job shares one source of truth. `targets` gates which jobs
  #     run; `version` is the optional explicit release version (C3_RELEASE_VERSION);
  #     `batch` is the shared time subdirectory all targets upload under; `publish`
  #     is false when workflow_dispatch sets skip_publish (no upload).
  # ────────────────────────────────────────────────────────────────────
  setup:
    name: 'setup (resolve targets + version + batch)'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
      version: ${{ steps.resolve.outputs.version }}
      batch: ${{ steps.resolve.outputs.batch }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Resolve targets + version + batch
        id: resolve
        shell: bash
        run: |
          targets="${{ inputs.targets }}"
          if [ -z "$targets" ]; then
            targets="linux-x64,macos-arm64,macos-x64,windows-x64"
          fi
          targets="$(echo "$targets" | tr -d '[:space:]')"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

          # Shared time subdirectory for the whole release (UTC, path-safe charset).
          batch="$(date -u +%Y%m%d-%H%MZ)"
          echo "batch=$batch" >> "$GITHUB_OUTPUT"

          # publish = false only when a manual run explicitly skips it; push tags always publish.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_publish }}" = "true" ]; then
            publish="false"
          else
            publish="true"
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "[setup] targets=$targets version='${{ inputs.version }}' batch=$batch publish=$publish"

  # ────────────────────────────────────────────────────────────────────
  # 0. pregate (source-level blocking gate; release 5/7)
  #    typecheck → lint → test → i18n:check → i18n:check-freeze
  #    Red here = NO compile attempted (cross-compile is the most expensive stage).
  # ────────────────────────────────────────────────────────────────────
  pregate:
    name: 'pregate (typecheck → lint → test → i18n:check → check-freeze)'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: i18n check
        run: pnpm i18n:check

      - name: i18n check-freeze
        run: pnpm i18n:check-freeze

  # ────────────────────────────────────────────────────────────────────
  # 1. build-publish-<target> (one self-contained job per target)
  #    build → smoke → sign → verify(postgate) → upload-to-server.
  #    Each runs on the target's NATIVE OS; the minisign secret + artifact-store secrets are
  #    available to every job. A deselected target / skip_publish gates the upload below.
  # ────────────────────────────────────────────────────────────────────
  build-publish-linux-x64:
    name: 'build+publish linux-x64'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'linux-x64')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build linux-x64
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=linux-x64 --skip-smoke --harden=basic

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-linux-x64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: linux-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}

  build-publish-macos-arm64:
    name: 'build+publish macos-arm64'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'macos-arm64')
    runs-on: macos-14
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build macos-arm64
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=macos-arm64 --skip-smoke --harden=basic

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-macos-arm64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: macos-arm64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}

  build-publish-macos-x64:
    name: 'build+publish macos-x64'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'macos-x64')
    runs-on: macos-13
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build macos-x64
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=macos-x64 --skip-smoke --harden=basic

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-macos-x64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: macos-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}

  build-publish-windows-x64:
    name: 'build+publish windows-x64 (⚠️ experimental)'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'windows-x64')
    runs-on: windows-latest
    timeout-minutes: 40
    defaults:
      run:
        shell: pwsh
    env:
      BUN_INSTALL: ${{ github.workspace }}\.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: irm bun.sh/install.ps1 | iex

      - name: Install dependencies
        run: |
          $env:PATH = "$env:BUN_INSTALL/bin;$env:PATH"
          pnpm install --frozen-lockfile

      - name: Build windows-x64
        run: |
          $env:PATH = "$env:BUN_INSTALL/bin;$env:PATH"
          pnpm release:build --targets=windows-x64 --skip-smoke --harden=basic

      - name: Smoke (--version + headless)
        run: |
          $pkg = Get-ChildItem dist/c3-v*-windows-x64.zip | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path dist/smoke | Out-Null
          Expand-Archive -Path $pkg.FullName -DestinationPath dist/smoke -Force
          node scripts/release/smoke.mjs --file=dist/smoke/c3.exe --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: windows-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}
