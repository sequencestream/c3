# Release workflow (release 6/7) — GH Actions native matrix for the c3 release pipeline.
#
# Why a separate workflow: bytecodes + macOS ad-hoc codesign only pay off when each target
# is built on its NATIVE OS runner. Cross-compile + bytecode segfaults (oven-sh/bun#18416);
# macOS ad-hoc needs a darwin host.
#
# Self-contained per-target jobs (no actions/upload-artifact): because cross-compile is
# banned, every target must build on its own native OS runner. Rather than shuttle the
# per-target outputs through GitHub's artifact store and re-gather them, each target runs
# the WHOLE tail in ONE job — build → smoke → sign → verify(postgate) → upload to the
# self-hosted store. The `needs:` chain enforces the gate order: a red pregate skips every
# target; within a target a failed build/smoke/sign/verify aborts that target's upload.
#
# Consequences of the self-contained design (intentional):
#   - The minisign secret is needed on all four OS runners (signing happens per target),
#     not just one publish runner.
#   - There is no cross-target unified manifest.json / SHA256SUMS: each target carries its
#     OWN single-target sidecars. Consumers verify a download with its own .minisig.
#
# Distribution: the signed artifacts are pushed to a self-hosted store via
# `scripts/publish/upload-to-server.mjs` (POST /v1/artifact/upload on the license-server),
# laid out as <version>/<batch>/<filename>. `batch` is resolved ONCE in `setup` so all
# targets of one release land in the same time subdirectory. The push is gated on the
# C3_ARTIFACT_SERVER_URL / C3_ARTIFACT_UPLOAD_TOKEN secrets being present.
#
# Target subset + version: a `setup` job resolves the `targets` input (default: all four),
# the `version` input (optional, e.g. v0.1.0 → C3_RELEASE_VERSION), and a shared `batch`.
# Every dispatch/tag run publishes. Each job is gated on `contains(targets, '<target>')`;
# a DESELECTED target is SKIPPED (not red).
#
# Trigger: workflow_dispatch (manual release entry; runs the full chain).
#          push tags: v* (re-build + re-sign + re-upload for the pushed tag).
#
# Local `pnpm release` still works — this workflow calls the same node scripts
# (release:build, release:smoke, sign, postgate) so local and CI share one source of truth.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.1.0 (overrides git-describe). Empty = derive from the git tag.'
        required: false
        default: ''
        type: string
      targets:
        description: 'Comma-separated targets to build (default: all = linux-x64,macos-arm64,macos-x64,windows-x64). Deselecting a P0 target (e.g. drop macos-x64 when Intel runners are starved) narrows the publish gate to the selected set.'
        required: false
        default: ''
        type: string
  push:
    tags: ['v*']

permissions:
  contents: read # checkout only — no git tag / gh release in this workflow

jobs:
  # ────────────────────────────────────────────────────────────────────
  # -1. setup — resolve the target subset + version + batch ONCE so every per-target
  #     job shares one source of truth. `targets` gates which jobs run; `version` is
  #     the optional explicit release version (C3_RELEASE_VERSION); `batch` is the
  #     shared time subdirectory all targets upload under. Every dispatch/tag run
  #     publishes (`publish` is always true; the upload `if` gate is kept for clarity).
  # ────────────────────────────────────────────────────────────────────
  setup:
    name: 'setup (resolve targets + version + batch)'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
      version: ${{ steps.resolve.outputs.version }}
      batch: ${{ steps.resolve.outputs.batch }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Resolve targets + version + batch
        id: resolve
        shell: bash
        run: |
          targets="${{ inputs.targets }}"
          if [ -z "$targets" ]; then
            targets="linux-x64,macos-arm64,macos-x64,windows-x64"
          fi
          targets="$(echo "$targets" | tr -d '[:space:]')"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

          # Shared time subdirectory for the whole release (UTC, path-safe charset).
          batch="$(date -u +%Y%m%d-%H%MZ)"
          echo "batch=$batch" >> "$GITHUB_OUTPUT"

          # Every dispatch/tag run publishes (no skip toggle).
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "[setup] targets=$targets version='${{ inputs.version }}' batch=$batch publish=true"

  # ────────────────────────────────────────────────────────────────────
  # -0.5 preflight — validate the artifact-store secrets BEFORE any expensive work.
  #    A no-file POST to the upload endpoint distinguishes (handler order: auth is
  #    checked before query-param validation):
  #      400 invalid_request → URL reachable + token ACCEPTED (params intentionally empty) ✅
  #      401 unauthenticated → token wrong/missing ❌
  #      503 unavailable     → server's own C3_LS_ARTIFACT_UPLOAD_TOKEN/DIR unset ❌
  #      000 / connect error → URL unreachable or malformed ❌
  #    Also prints SAFE metadata (URL scheme+host, token length) without leaking the
  #    secret values. Runs in the `default` environment so the env-scoped secrets resolve.
  #    pregate + every build job `needs:` this, so a red preflight skips the entire
  #    downstream chain (no 40-min builds on a bad upload config). Any non-400 probe
  #    result HARD-FAILS the job.
  # ────────────────────────────────────────────────────────────────────
  preflight:
    name: 'preflight (validate artifact-store secrets)'
    needs: [setup]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: default
    timeout-minutes: 5
    steps:
      - name: Probe upload endpoint + print safe prefixes
        shell: bash
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: |
          set +x  # never trace — keep the token out of the log
          server="${C3_ARTIFACT_SERVER_URL%/}"
          token="$C3_ARTIFACT_UPLOAD_TOKEN"

          if [ -z "$server" ] || [ -z "$token" ]; then
            echo "::error::C3_ARTIFACT_SERVER_URL / C3_ARTIFACT_UPLOAD_TOKEN is empty/unset in the default environment."
            exit 1
          fi

          # Safe metadata only (GitHub masks the full secret values; token value never printed).
          host="$(printf '%s' "$server" | sed -E 's#^(https?://[^/]+).*#\1#')"
          echo "[preflight] URL    : host=${host}  length=${#server}"
          echo "[preflight] TOKEN  : length=${#token}"

          # No-file POST: auth is checked before params, so empty params yield 400 iff the token is good.
          code="$(curl -sS -o /tmp/probe-body --max-time 20 -w '%{http_code}' \
            -X POST -H "Authorization: Bearer ${token}" \
            "${server}/v1/artifact/upload?version=&batch=&filename=" || echo 000)"
          echo "[preflight] probe HTTP ${code} — body: $(cat /tmp/probe-body 2>/dev/null)"

          case "$code" in
            400) echo "[preflight] ✅ URL reachable + token accepted (empty params → 400 as expected)";;
            401) echo "::error::token REJECTED (401). C3_ARTIFACT_UPLOAD_TOKEN does not match the server.";  exit 1;;
            503) echo "::error::server upload not configured (503). Set C3_LS_ARTIFACT_UPLOAD_TOKEN/DIR on the license-server."; exit 1;;
            000) echo "::error::URL unreachable / connection failed (000). Check C3_ARTIFACT_SERVER_URL.";   exit 1;;
            *)   echo "::error::unexpected HTTP ${code} from the upload endpoint.";                          exit 1;;
          esac

  # ────────────────────────────────────────────────────────────────────
  # 0. pregate (source-level blocking gate; release 5/7)
  #    typecheck → lint → test → i18n:check → i18n:check-freeze
  #    Red here = NO compile attempted (cross-compile is the most expensive stage).
  # ────────────────────────────────────────────────────────────────────
  pregate:
    name: 'pregate (typecheck → lint → test → i18n:check → check-freeze)'
    needs: [setup, preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: i18n check
        run: pnpm i18n:check

      - name: i18n check-freeze
        run: pnpm i18n:check-freeze

  # ────────────────────────────────────────────────────────────────────
  # 1. build-publish-<target> (one self-contained job per target)
  #    build → smoke → sign → verify(postgate) → upload-to-server.
  #    Each runs on the target's NATIVE OS; the minisign secret + artifact-store secrets are
  #    available to every job. A deselected target gates whether this job runs at all.
  # ────────────────────────────────────────────────────────────────────
  build-publish-linux-x64:
    name: 'build+publish linux-x64'
    needs: [pregate, setup, preflight]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'linux-x64')
    runs-on: ubuntu-latest
    environment: default
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build linux-x64
        env:
          C3_OBFUSCATE_FAIL: abort # standard tier: obfuscation failure hard-fails (no silent bare fallback)
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=linux-x64 --skip-smoke --harden=standard

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-linux-x64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: linux-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}

  build-publish-macos-arm64:
    name: 'build+publish macos-arm64'
    needs: [pregate, setup, preflight]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'macos-arm64')
    runs-on: macos-14
    environment: default
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build macos-arm64
        env:
          C3_OBFUSCATE_FAIL: abort # standard tier: obfuscation failure hard-fails (no silent bare fallback)
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=macos-arm64 --skip-smoke --harden=standard

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-macos-arm64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: macos-arm64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}

  build-publish-macos-x64:
    name: 'build+publish macos-x64'
    needs: [pregate, setup, preflight]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'macos-x64')
    runs-on: macos-13
    environment: default
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build macos-x64
        env:
          C3_OBFUSCATE_FAIL: abort # standard tier: obfuscation failure hard-fails (no silent bare fallback)
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=macos-x64 --skip-smoke --harden=standard

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-macos-x64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: macos-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}

  build-publish-windows-x64:
    name: 'build+publish windows-x64 (⚠️ experimental)'
    needs: [pregate, setup, preflight]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'windows-x64')
    runs-on: windows-latest
    environment: default
    timeout-minutes: 40
    defaults:
      run:
        shell: pwsh
    env:
      BUN_INSTALL: ${{ github.workspace }}\.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: irm bun.sh/install.ps1 | iex

      - name: Install dependencies
        run: |
          $env:PATH = "$env:BUN_INSTALL/bin;$env:PATH"
          pnpm install --frozen-lockfile

      - name: Build windows-x64
        env:
          C3_OBFUSCATE_FAIL: abort # standard tier: obfuscation failure hard-fails (no silent bare fallback)
        run: |
          $env:PATH = "$env:BUN_INSTALL/bin;$env:PATH"
          pnpm release:build --targets=windows-x64 --skip-smoke --harden=standard

      - name: Smoke (--version + headless)
        run: |
          $pkg = Get-ChildItem dist/c3-v*-windows-x64.zip | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path dist/smoke | Out-Null
          Expand-Archive -Path $pkg.FullName -DestinationPath dist/smoke -Force
          node scripts/release/smoke.mjs --file=dist/smoke/c3.exe --timeout=20000

      - name: Sign artifacts
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: windows-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Push artifacts to self-hosted store
        if: ${{ needs.setup.outputs.publish == 'true' }}
        env:
          C3_ARTIFACT_SERVER_URL: ${{ secrets.C3_ARTIFACT_SERVER_URL }}
          C3_ARTIFACT_UPLOAD_TOKEN: ${{ secrets.C3_ARTIFACT_UPLOAD_TOKEN }}
        run: node scripts/publish/upload-to-server.mjs --dist=dist --batch=${{ needs.setup.outputs.batch }}
