# Release workflow (release 6/7) — GH Actions native matrix for the c3 release pipeline.
#
# Why a separate workflow: bytecodes + macOS ad-hoc codesign only pay off when each target
# is built on its NATIVE OS runner. Cross-compile + bytecode segfaults (oven-sh/bun#18416);
# macOS ad-hoc needs a darwin host.
#
# Per-target build jobs: because cross-compile is banned, every target builds on its own
# native OS runner. Each target job runs build → smoke → checksum → verify(postgate), then
# uploads its signed artifacts (actions/upload-artifact). A final `publish` job gathers all
# targets and cuts ONE public GitHub Release. The `needs:` chain enforces the gate order: a
# red pregate skips every target; within a target a failed build/smoke/checksum/verify aborts it.
#
# Consequences of the per-target design (intentional):
#   - There is no cross-target unified manifest.json / SHA256SUMS: each target carries its
#     OWN single-target sidecars. Consumers cross-check a download with its own .sha256.
#
# Distribution: the `publish` job downloads every target's artifacts and creates a public
# GitHub Release (`gh release create`), with notes auto-generated from the merged-PR / commit
# history since the last release (`--generate-notes`, categorized by .github/release.yml).
# Integrity is the sha256 sidecars + GitHub HTTPS (open-source builds carry no code signature).
#
# Target subset + version: a `setup` job resolves the `targets` input (default: all four)
# and the `version` input (optional, e.g. v0.1.0 → C3_RELEASE_VERSION). Each build job is
# gated on `contains(targets, '<target>')`; a DESELECTED target is SKIPPED (not red).
#
# Trigger: workflow_dispatch (manual release entry; runs the full chain).
#          push tags: v* (re-build + re-publish for the pushed tag).
#
# Local `pnpm release` still works — this workflow calls the same node scripts
# (release:build, release:smoke, sign, postgate) so local and CI share one source of truth.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. v0.1.0 (overrides git-describe). Empty = derive from the git tag.'
        required: false
        default: ''
        type: string
      targets:
        description: 'Comma-separated targets to build (default: all = linux-x64,macos-arm64,macos-x64,windows-x64). Deselecting a P0 target (e.g. drop macos-x64 when Intel runners are starved) narrows the publish gate to the selected set.'
        required: false
        default: ''
        type: string
  push:
    tags: ['v*']

permissions:
  contents: read # checkout only — no git tag / gh release in this workflow

jobs:
  # ────────────────────────────────────────────────────────────────────
  # -1. setup — resolve the target subset + version + batch ONCE so every per-target
  #     job shares one source of truth. `targets` gates which jobs run; `version` is
  #     the optional explicit release version (C3_RELEASE_VERSION). Every dispatch/tag
  #     run publishes (`publish` is always true; the publish job's `if` gate keeps it explicit).
  # ────────────────────────────────────────────────────────────────────
  setup:
    name: 'setup (resolve targets + version + batch)'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
      version: ${{ steps.resolve.outputs.version }}
      batch: ${{ steps.resolve.outputs.batch }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Resolve targets + version + batch
        id: resolve
        shell: bash
        run: |
          targets="${{ inputs.targets }}"
          if [ -z "$targets" ]; then
            targets="linux-x64,macos-arm64,macos-x64,windows-x64"
          fi
          targets="$(echo "$targets" | tr -d '[:space:]')"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

          # Shared time subdirectory for the whole release (UTC, path-safe charset).
          batch="$(date -u +%Y%m%d-%H%MZ)"
          echo "batch=$batch" >> "$GITHUB_OUTPUT"

          # Every dispatch/tag run publishes (no skip toggle).
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "[setup] targets=$targets version='${{ inputs.version }}' batch=$batch publish=true"

  # ────────────────────────────────────────────────────────────────────
  # 0. pregate (source-level blocking gate; release 5/7)
  #    typecheck → lint → test → i18n:check → i18n:check-freeze
  #    Red here = NO compile attempted (cross-compile is the most expensive stage).
  # ────────────────────────────────────────────────────────────────────
  pregate:
    name: 'pregate (typecheck → lint → test → i18n:check → check-freeze)'
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: i18n check
        run: pnpm i18n:check

      - name: i18n check-freeze
        run: pnpm i18n:check-freeze

  # ────────────────────────────────────────────────────────────────────
  # 1. build-publish-<target> (one self-contained job per target)
  #    build → smoke → checksum → verify(postgate) → upload-artifact (for the publish job).
  #    Each runs on the target's NATIVE OS. A deselected target gates whether this job runs.
  # ────────────────────────────────────────────────────────────────────
  build-publish-linux-x64:
    name: 'build+publish linux-x64'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'linux-x64')
    runs-on: ubuntu-latest
    environment: default
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build linux-x64
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=linux-x64 --skip-smoke

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-linux-x64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Checksum artifacts
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: linux-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Upload signed artifacts for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: c3-linux-x64
          path: |
            dist/c3-v*-linux-x64.tar.gz
            dist/c3-v*-linux-x64.zip
            dist/*.sha256
            dist/SHA256SUMS*
          if-no-files-found: error
          retention-days: 7

  build-publish-macos-arm64:
    name: 'build+publish macos-arm64'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'macos-arm64')
    runs-on: macos-14
    environment: default
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build macos-arm64
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=macos-arm64 --skip-smoke

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-macos-arm64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Checksum artifacts
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: macos-arm64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Upload signed artifacts for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: c3-macos-arm64
          path: |
            dist/c3-v*-macos-arm64.tar.gz
            dist/c3-v*-macos-arm64.zip
            dist/*.sha256
            dist/SHA256SUMS*
          if-no-files-found: error
          retention-days: 7

  build-publish-macos-x64:
    name: 'build+publish macos-x64'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'macos-x64')
    runs-on: macos-13
    environment: default
    timeout-minutes: 40
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm install --frozen-lockfile

      - name: Build macos-x64
        run: |
          export PATH="$BUN_INSTALL/bin:$PATH"
          pnpm release:build --targets=macos-x64 --skip-smoke

      - name: Smoke (--version + headless)
        run: |
          pkg=$(ls dist/c3-v*-macos-x64.tar.gz | head -1)
          mkdir -p dist/smoke
          tar -xzf "$pkg" -C dist/smoke
          node scripts/release/smoke.mjs --file=dist/smoke/c3 --timeout=20000

      - name: Checksum artifacts
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: macos-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Upload signed artifacts for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: c3-macos-x64
          path: |
            dist/c3-v*-macos-x64.tar.gz
            dist/c3-v*-macos-x64.zip
            dist/*.sha256
            dist/SHA256SUMS*
          if-no-files-found: error
          retention-days: 7

  build-publish-windows-x64:
    name: 'build+publish windows-x64 (⚠️ experimental)'
    needs: [pregate, setup]
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'push') &&
      contains(needs.setup.outputs.targets, 'windows-x64')
    runs-on: windows-latest
    environment: default
    timeout-minutes: 40
    defaults:
      run:
        shell: pwsh
    env:
      BUN_INSTALL: ${{ github.workspace }}\.bun
      C3_RELEASE_VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: irm bun.sh/install.ps1 | iex

      - name: Install dependencies
        run: |
          $env:PATH = "$env:BUN_INSTALL/bin;$env:PATH"
          pnpm install --frozen-lockfile

      - name: Build windows-x64
        run: |
          $env:PATH = "$env:BUN_INSTALL/bin;$env:PATH"
          pnpm release:build --targets=windows-x64 --skip-smoke

      - name: Smoke (--version + headless)
        run: |
          $pkg = Get-ChildItem dist/c3-v*-windows-x64.zip | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path dist/smoke | Out-Null
          Expand-Archive -Path $pkg.FullName -DestinationPath dist/smoke -Force
          node scripts/release/smoke.mjs --file=dist/smoke/c3.exe --timeout=20000

      - name: Checksum artifacts
        run: node scripts/release/sign.mjs --manifest=dist/manifest.json

      - name: Verify distribution consistency
        env:
          C3_REQUIRED_TARGETS: windows-x64
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

      - name: Upload signed artifacts for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: c3-windows-x64
          path: |
            dist/c3-v*-windows-x64.tar.gz
            dist/c3-v*-windows-x64.zip
            dist/*.sha256
            dist/SHA256SUMS*
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # 2. publish — gather every target's signed artifacts and cut ONE public
  #    GitHub Release. Release notes are auto-generated from the merged-PR /
  #    commit history since the previous release (GitHub `--generate-notes`,
  #    categorized by .github/release.yml). Runs only after all selected
  #    targets succeed; needs `contents: write` to create the Release + tag.
  # ────────────────────────────────────────────────────────────────────
  publish:
    name: 'publish (GitHub Release + auto notes)'
    needs:
      [
        setup,
        build-publish-linux-x64,
        build-publish-macos-arm64,
        build-publish-macos-x64,
        build-publish-windows-x64,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the Release + tag and upload assets
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --generate-notes can diff against the last release

      - name: Download all target artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          pattern: c3-*
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          tag="${{ needs.setup.outputs.version }}"
          if [ -z "$tag" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          fi
          if [ -z "$tag" ]; then
            echo "::error::no release version resolved (pass the 'version' input or push a v* tag)."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "[publish] release tag: $tag"

      - name: Create or update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          shopt -s nullglob
          assets=(release-dist/*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::no artifacts downloaded — nothing to publish."
            exit 1
          fi
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "[publish] release $tag exists — uploading assets (clobber)."
            gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "[publish] creating release $tag with auto-generated notes."
            gh release create "$tag" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              --generate-notes
          fi
