# Release workflow (release 6/7) — GH Actions native matrix for the c3 release pipeline.
#
# Why a separate workflow: bytecodes + macOS ad-hoc codesign + SLSA provenance only
# pay off when each target is built on its NATIVE OS runner. Cross-compile + bytecode
# segfaults (oven-sh/bun#18416); macOS ad-hoc needs a darwin host; SLSA OIDC keyless
# needs the runner's own OIDC token. The `needs:` chain below PHYSICALLY enforces the
# four-layer gate order from specs/non-functional/release.md "Quality gates": pregate →
# build → smoke → verify-dist. A red pregate skips all builds; a red build skips its
# smoke; a red smoke skips verify-dist; a red verify-dist skips provenance + publish.
#
# Trigger: workflow_dispatch (manual release entry; runs the full chain).
#          push tags: v* (publish-only re-verify; new tags re-cut the GH Release).
#
# Local `pnpm release` still works — this workflow calls the same node scripts
# (release:build, release:smoke, release:verify-dist, release:publish) so local
# and CI share one source of truth.
name: Release

on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated target subset (default: full P0). P1=windows-x64 is best-effort.'
        required: false
        default: ''
        type: string
      skip_publish:
        description: 'Skip the publish job (sign + verify-dist only, no tag, no gh).'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    tags: ['v*']

permissions:
  contents: write       # for git tag + gh release
  id-token: write       # for SLSA OIDC keyless provenance
  attestations: write   # for actions/attest-build-provenance

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 0. pregate (source-level blocking gate; release 5/7)
  #    typecheck → lint → test → i18n:check → i18n:check-freeze
  #    Red here = NO compile attempted (cross-compile is the most expensive stage).
  # ────────────────────────────────────────────────────────────────────
  pregate:
    name: 'pregate (typecheck → lint → test → i18n:check → check-freeze)'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: i18n check
        run: pnpm i18n:check

      - name: i18n check-freeze
        run: pnpm i18n:check-freeze

  # ────────────────────────────────────────────────────────────────────
  # 1. native build (one job per target; release 6/7 matrix)
  #    Each job runs `release:build --targets=<one> --skip-smoke --harden=basic`
  #    so the matrix fans out cleanly with no inter-job race. The build script's
  #    Phase2 fan-out is collapsed to a single target per job (CI matrix > in-process).
  #    bytecode auto-on for native host (release 6/7); cross-compile kept off (#18416).
  # ────────────────────────────────────────────────────────────────────
  build:linux-x64:
    name: 'build linux-x64'
    needs: [pregate]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin:${{ env.PATH }}

      - name: Build linux-x64
        run: pnpm release:build --targets=linux-x64 --skip-smoke --harden=basic
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin:${{ env.PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-linux-x64
          path: |
            dist/c3-v*-linux-x64
            dist/c3-v*-linux-x64.sha256
            dist/c3-v*-linux-x64.minisig
            dist/SHA256SUMS
            dist/manifest.json
          if-no-files-found: error
          retention-days: 7

  build:macos-arm64:
    name: 'build macos-arm64'
    needs: [pregate]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: macos-14
    timeout-minutes: 30
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin:${{ env.PATH }}

      - name: Build macos-arm64
        run: pnpm release:build --targets=macos-arm64 --skip-smoke --harden=basic
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin:${{ env.PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-macos-arm64
          path: |
            dist/c3-v*-macos-arm64
            dist/c3-v*-macos-arm64.sha256
            dist/c3-v*-macos-arm64.minisig
            dist/SHA256SUMS
            dist/manifest.json
          if-no-files-found: error
          retention-days: 7

  build:macos-x64:
    name: 'build macos-x64'
    needs: [pregate]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: macos-13
    timeout-minutes: 30
    env:
      BUN_INSTALL: ${{ github.workspace }}/.bun
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
        shell: bash

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin:${{ env.PATH }}

      - name: Build macos-x64
        run: pnpm release:build --targets=macos-x64 --skip-smoke --harden=basic
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin:${{ env.PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-macos-x64
          path: |
            dist/c3-v*-macos-x64
            dist/c3-v*-macos-x64.sha256
            dist/c3-v*-macos-x64.minisig
            dist/SHA256SUMS
            dist/manifest.json
          if-no-files-found: error
          retention-days: 7

  build:windows-x64:
    name: 'build windows-x64 (⚠️ experimental)'
    needs: [pregate]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    env:
      BUN_INSTALL: ${{ github.workspace }}\.bun
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Bun
        run: irm bun.sh/install.ps1 | iex

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin;${{ env.PATH }}

      - name: Build windows-x64
        run: pnpm release:build --targets=windows-x64 --skip-smoke --harden=basic
        env:
          BUN_INSTALL: ${{ env.BUN_INSTALL }}
          PATH: ${{ env.BUN_INSTALL }}/bin;${{ env.PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c3-windows-x64
          path: |
            dist/c3-v*-windows-x64.exe
            dist/c3-v*-windows-x64.exe.sha256
            dist/c3-v*-windows-x64.exe.minisig
            dist/SHA256SUMS
            dist/manifest.json
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # 2. native smoke (one job per target, runs its own artifact)
  #    `release:smoke --file=<artifact>` is the artifact-level gate (release 5/7):
  #    `--version` echo + headless server boot probed over HTTP, never calls claude.
  #    Each smoke runs on the SAME OS the build did, so cross-compile ban is moot.
  # ────────────────────────────────────────────────────────────────────
  smoke:linux-x64:
    name: 'smoke linux-x64 (--version + headless)'
    needs: [build:linux-x64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: c3-linux-x64
          path: dist

      - name: Headless smoke
        run: node scripts/release/smoke.mjs --file=$(ls dist/c3-v*-linux-x64 | head -1) --timeout=20000

  smoke:macos-arm64:
    name: 'smoke macos-arm64 (--version + headless)'
    needs: [build:macos-arm64]
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: c3-macos-arm64
          path: dist

      - name: Headless smoke
        run: node scripts/release/smoke.mjs --file=$(ls dist/c3-v*-macos-arm64 | head -1) --timeout=20000

  smoke:macos-x64:
    name: 'smoke macos-x64 (--version + headless)'
    needs: [build:macos-x64]
    runs-on: macos-13
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: c3-macos-x64
          path: dist

      - name: Headless smoke
        run: node scripts/release/smoke.mjs --file=$(ls dist/c3-v*-macos-x64 | head -1) --timeout=20000

  smoke:windows-x64:
    name: 'smoke windows-x64 (--version + headless)'
    needs: [build:windows-x64]
    runs-on: windows-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: c3-windows-x64
          path: dist

      - name: Headless smoke
        run: node scripts/release/smoke.mjs --file=(Get-ChildItem dist/c3-v*-windows-x64.exe | Select-Object -First 1).FullName --timeout=20000

  # ────────────────────────────────────────────────────────────────────
  # 3. verify-dist (publish final check; release 5/7)
  #    Re-aggregate every artifact into one dist/ then run postgate: sha256
  #    re-hash + manifest↔SHA256SUMS agreement + P0 completeness. Aborts the
  #    rest of the chain on mismatch (no SLSA attest, no publish).
  # ────────────────────────────────────────────────────────────────────
  verify-dist:
    name: 'verify-dist (manifest ↔ SHA256SUMS ↔ on-disk + P0)'
    needs:
      - smoke:linux-x64
      - smoke:macos-arm64
      - smoke:macos-x64
      - smoke:windows-x64
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List dist
        run: ls -la dist

      - name: Verify distribution consistency
        run: node scripts/release/postgate.mjs --manifest=dist/manifest.json

  # ────────────────────────────────────────────────────────────────────
  # 4. SLSA provenance (release 6/7, P1) — OIDC keyless attestation
  #    `actions/attest-build-provenance` mints SLSA L3 provenance per artifact
  #    using the runner's OIDC token (no key to manage). The .intoto.jsonl
  #    attestation is uploaded to the GH Release alongside the binary; consumers
  #    verify with `gh attestation verify <file>`. Intentionally NOT in the
  #    verify-dist gate — provenance is a parallel "supply-chain transparency"
  #    artifact, not a trust root (minisign signatures are the trust root).
  # ────────────────────────────────────────────────────────────────────
  provenance:
    name: 'SLSA provenance (OIDC keyless)'
    needs: [verify-dist]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attest linux-x64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/c3-v*-linux-x64

      - name: Attest macos-arm64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/c3-v*-macos-arm64

      - name: Attest macos-x64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/c3-v*-macos-x64

      - name: Attest windows-x64
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/c3-v*-windows-x64.exe

  # ────────────────────────────────────────────────────────────────────
  # 5. publish — sign + cut the GH Release (release 3/7)
  #    workflow_dispatch: full publish (sign + verify-dist re-check + tag + gh).
  #    push tags: v*     : re-verify + re-cut the GH Release (matrix output is the
  #                        same set of artifacts; sign runs again because we don't
  #                        carry sidecars across runs by design — see spec §5).
  #    --skip-publish input: stop after sign+verify-dist; no tag, no gh.
  # ────────────────────────────────────────────────────────────────────
  publish:
    name: 'publish (sign + tag + gh release)'
    needs: [provenance]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Determine --no-publish flag
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "no_publish=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.skip_publish }}" = "true" ]; then
            echo "no_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign + (re)verify + tag + publish
        env:
          C3_MINISIGN_SECRET_KEY: ${{ secrets.C3_MINISIGN_SECRET_KEY }}
        run: |
          if [ "${{ steps.flags.outputs.no_publish }}" = "true" ]; then
            node scripts/release/publish.mjs --no-publish --manifest=dist/manifest.json
          else
            node scripts/release/publish.mjs --manifest=dist/manifest.json
          fi
