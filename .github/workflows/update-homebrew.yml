name: Update Homebrew Formula

# 每次 Release 发布后，把 sequencestream/homebrew-tap 里的 c3 formula 更新到最新版本。
#
# 触发方式说明:
#   本仓库的 Release 由 `release.yml` 的 publish job 使用默认 GITHUB_TOKEN 通过
#   `gh release create` 创建。GitHub 的防递归规则会让「由 GITHUB_TOKEN 创建的
#   Release」不再触发 `release: published` 事件,因此这里不能用 `on: release`,
#   而是监听 Release 工作流跑完的 `workflow_run`,确保自动生效。
#   `workflow_dispatch` 保留手动补跑某个 tag 的入口。
on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sync (e.g. v0.2.0)'
        required: true

permissions:
  contents: read

jobs:
  update-formula:
    # 手动补跑,或 Release 工作流成功完成时才更新 formula。
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # workflow_run 事件不带 tag,取最新一条 Release 作为要同步的目标。
            TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 \
                    --json tagName --jq '.[0].tagName')
          fi
          if [ -z "$TAG" ]; then
            echo "::error::could not resolve a release tag"; exit 1
          fi
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"  >> "$GITHUB_OUTPUT"

      - name: Fetch checksums from release
        id: sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.rel.outputs.tag }}"
          VERSION="${{ steps.rel.outputs.version }}"
          MAC_SIDECAR="c3-v${VERSION}-macos-arm64.tar.gz.sha256"
          LINUX_SIDECAR="c3-v${VERSION}-linux-x64.tar.gz.sha256"
          # release 不产出可靠的汇总 SHA256SUMS(各 target job 会互相覆盖),
          # 因此读每个产物独立的 `.sha256` 附属文件。
          # Release 发布与资产上传之间可能有短暂窗口,轮询等待附属文件就绪。
          for attempt in $(seq 1 30); do
            ok=1
            gh release download "$TAG" --repo "${{ github.repository }}" \
              --pattern "$MAC_SIDECAR"   --output mac.sha256   --clobber 2>/dev/null || ok=0
            gh release download "$TAG" --repo "${{ github.repository }}" \
              --pattern "$LINUX_SIDECAR" --output linux.sha256 --clobber 2>/dev/null || ok=0
            if [ "$ok" = "1" ] && [ -s mac.sha256 ] && [ -s linux.sha256 ]; then
              break
            fi
            echo "sha256 sidecars not ready (attempt ${attempt}); waiting 10s..."
            sleep 10
          done
          if [ ! -s mac.sha256 ] || [ ! -s linux.sha256 ]; then
            echo "::error::sha256 sidecars never appeared for ${TAG} after 5 minutes"; exit 1
          fi
          # `.sha256` 每行格式: `<hex>  <name>`
          MAC_ARM=$(awk '{print $1}' mac.sha256)
          LINUX_X64=$(awk '{print $1}' linux.sha256)
          if [ -z "$MAC_ARM" ] || [ -z "$LINUX_X64" ]; then
            echo "::error::failed to parse sha256 hex from sidecars"; exit 1
          fi
          echo "mac_arm=$MAC_ARM"     >> "$GITHUB_OUTPUT"
          echo "linux_x64=$LINUX_X64" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: sequencestream/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        env:
          VERSION: ${{ steps.rel.outputs.version }}
          MAC_ARM: ${{ steps.sums.outputs.mac_arm }}
          LINUX_X64: ${{ steps.sums.outputs.linux_x64 }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/v${VERSION}"
          cat > homebrew-tap/Formula/c3.rb <<EOF
          class C3 < Formula
            desc "Code Creative Center — harness/loop engineering for AI software work"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "${BASE}/c3-v${VERSION}-macos-arm64.tar.gz"
                sha256 "${MAC_ARM}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE}/c3-v${VERSION}-linux-x64.tar.gz"
                sha256 "${LINUX_X64}"
              end
            end

            def install
              bin.install "c3"
            end

            test do
              system "#{bin}/c3", "--version"
            end
          end
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/c3.rb; then
            echo "Formula already up to date for v${VERSION}; nothing to do."
            exit 0
          fi
          git add Formula/c3.rb
          git commit -m "c3 ${VERSION}"
          git push
