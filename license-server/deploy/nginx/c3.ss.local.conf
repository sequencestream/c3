# Local-dev nginx for the license-server: https://c3.ss.local -> 127.0.0.1:8787.
#
# Mirrors the other *.ss.local vhosts (mkcert TLS, 80->443 redirect). Install on
# Homebrew nginx (Apple Silicon) by symlinking into the servers/ include dir:
#
#   ln -sf "$PWD/license-server/deploy/nginx/c3.ss.local.conf" \
#          /opt/homebrew/etc/nginx/servers/c3.ss.local.conf
#   mkcert -cert-file /opt/homebrew/etc/nginx/ssl/c3.ss.local.pem \
#          -key-file  /opt/homebrew/etc/nginx/ssl/c3.ss.local-key.pem c3.ss.local
#   echo '127.0.0.1 c3.ss.local' | sudo tee -a /etc/hosts   # + ::1
#   nginx -t && nginx -s reload
#
# Paths below are Homebrew/Apple-Silicon (/opt/homebrew). On Intel macs swap to
# /usr/local. The license-server is plain HTTP; nginx terminates TLS and passes
# X-Forwarded-Proto so the backend knows the original scheme.

# 80 -> 443 redirect
server {
    listen       80;
    server_name  c3.ss.local;
    return 301 https://$host$request_uri;
}

# c3.ss.local -> license-server (HTTPS, reverse proxy to local 8787)
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    server_name  c3.ss.local;

    ssl_certificate     /opt/homebrew/etc/nginx/ssl/c3.ss.local.pem;
    ssl_certificate_key /opt/homebrew/etc/nginx/ssl/c3.ss.local-key.pem;

    location / {
        proxy_pass         http://127.0.0.1:8787;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long-lived connection support (harmless for the plain-HTTP backend).
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    access_log /opt/homebrew/var/log/nginx/c3.access.log;
    error_log  /opt/homebrew/var/log/nginx/c3.error.log;
}
